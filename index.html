<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠 하우스 태동 입주 준비 대시보드</title>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── Loading Overlay ── */
  #loading-overlay {
    position: fixed; inset: 0;
    background: #1a1a2e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    gap: 16px;
    transition: opacity 0.4s;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: rgba(255,255,255,0.7); font-size: 0.88rem; }

  /* ── Save Status ── */
  #save-status {
    position: fixed;
    bottom: 24px; right: 24px;
    background: #1a1a2e;
    color: white;
    padding: 8px 16px;
    border-radius: 99px;
    font-size: 0.78rem;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 500;
    display: flex; align-items: center; gap: 6px;
  }
  #save-status.show { opacity: 1; }
  #save-status.saving { background: #6366f1; }
  #save-status.saved  { background: #22c55e; }
  #save-status.error  { background: #ef4444; }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: white;
    padding: 28px 32px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
  header .subtitle { font-size: 0.85rem; opacity: 0.7; margin-top: 4px; }
  .dday-badge {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 600;
    backdrop-filter: blur(4px);
    cursor: pointer;
  }

  /* ── Layout ── */
  .container { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .col-span-2 { grid-column: span 2; }
  .col-span-3 { grid-column: span 3; }
  .section-gap { margin-top: 24px; }

  /* ── Card ── */
  .card {
    background: white;
    border-radius: 16px;
    padding: 22px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    position: relative;
    overflow: hidden;
  }
  .card-title {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #8b92a5;
    margin-bottom: 10px;
  }
  .card-value {
    font-size: 1.9rem;
    font-weight: 800;
    color: #1a1a2e;
    letter-spacing: -1px;
    line-height: 1;
  }
  .card-sub { font-size: 0.82rem; color: #8b92a5; margin-top: 6px; }
  .card-accent {
    position: absolute; top: 0; right: 0;
    width: 5px; height: 100%;
    border-radius: 0 16px 16px 0;
  }

  /* ── Progress ── */
  .progress-wrap { margin-top: 10px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 0.78rem; color: #8b92a5; margin-bottom: 5px;
  }
  .progress-bar-bg { background: #eef0f5; border-radius: 99px; height: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

  /* ── Section Header ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title {
    font-size: 1.05rem; font-weight: 700; color: #1a1a2e;
    display: flex; align-items: center; gap: 8px;
  }
  .section-icon {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 0.95rem;
  }

  /* ── Cost Table ── */
  .cost-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .cost-table th {
    background: #f7f8fc; padding: 9px 12px; text-align: left;
    font-size: 0.75rem; font-weight: 600; color: #8b92a5;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .cost-table th:last-child { text-align: right; }
  .cost-table td { padding: 10px 12px; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }
  .cost-table td:last-child { text-align: right; font-weight: 600; }
  .cost-table tr:last-child td { border-bottom: none; }
  .cost-table tr:hover td { background: #fafbff; }
  .badge-paid   { display:inline-block; background:#e8faf0; color:#22c55e; font-size:0.7rem; font-weight:700; padding:2px 7px; border-radius:99px; }
  .badge-due    { display:inline-block; background:#fff3e8; color:#f97316; font-size:0.7rem; font-weight:700; padding:2px 7px; border-radius:99px; }
  .badge-pending{ display:inline-block; background:#f0f2f5; color:#8b92a5; font-size:0.7rem; font-weight:700; padding:2px 7px; border-radius:99px; }
  .cost-total-row td { background:#f7f8fc; font-weight:700; color:#1a1a2e; border-top:2px solid #e5e7ef; }

  /* ── Timeline ── */
  .timeline { position: relative; padding-left: 20px; }
  .timeline::before {
    content: ''; position: absolute; left: 7px; top: 8px; bottom: 8px;
    width: 2px; background: linear-gradient(to bottom, #6366f1, #e5e7ef);
  }
  .timeline-item { position: relative; margin-bottom: 16px; padding-left: 20px; cursor: pointer; }
  .timeline-item:last-child { margin-bottom: 0; }
  .timeline-dot { position: absolute; left: -20px; top: 3px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; }
  .timeline-dot.done     { background: #22c55e; box-shadow: 0 0 0 2px #22c55e; }
  .timeline-dot.upcoming { background: #f97316; box-shadow: 0 0 0 2px #f97316; }
  .timeline-dot.future   { background: #e5e7ef; box-shadow: 0 0 0 2px #cbd5e1; }
  .timeline-date   { font-size: 0.75rem; color: #8b92a5; font-weight: 600; }
  .timeline-desc   { font-size: 0.88rem; font-weight: 600; color: #1a1a2e; }
  .timeline-amount { font-size: 0.85rem; color: #6366f1; font-weight: 700; }

  /* ── Todo ── */
  .todo-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 8px; border-bottom: 1px solid #f0f2f5;
    cursor: pointer; border-radius: 8px; transition: background 0.15s;
  }
  .todo-item:last-child { border-bottom: none; }
  .todo-item:hover { background: #fafbff; }
  .todo-checkbox {
    width: 20px; height: 20px; border: 2px solid #cbd5e1; border-radius: 6px;
    flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; cursor: pointer; font-size: 0.7rem; color: white;
  }
  .todo-checkbox.checked { background: #6366f1; border-color: #6366f1; }
  .todo-text { flex: 1; }
  .todo-label { font-size: 0.88rem; font-weight: 500; line-height: 1.4; }
  .todo-label.done { text-decoration: line-through; color: #b0b7c3; }
  .todo-note { font-size: 0.75rem; color: #8b92a5; margin-top: 2px; }
  .todo-priority { font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; flex-shrink: 0; }
  .priority-high { background: #fee2e2; color: #ef4444; }
  .priority-mid  { background: #fff3e8; color: #f97316; }
  .priority-low  { background: #f0f2f5; color: #8b92a5; }

  /* ── Shop ── */
  .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .shop-item {
    border: 1.5px solid #e5e7ef; border-radius: 12px; padding: 14px 16px;
    transition: all 0.15s; cursor: pointer; position: relative;
  }
  .shop-item:hover { border-color: #6366f1; box-shadow: 0 2px 12px rgba(99,102,241,0.1); }
  .shop-item.bought { background: #f7f8fc; opacity: 0.6; }
  .shop-item.bought .shop-name { text-decoration: line-through; color: #b0b7c3; }
  .shop-category { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #8b92a5; margin-bottom: 5px; }
  .shop-name  { font-size: 0.88rem; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
  .shop-price { font-size: 0.82rem; color: #6366f1; font-weight: 700; }
  .shop-check {
    position: absolute; top: 10px; right: 12px;
    width: 18px; height: 18px; border: 2px solid #cbd5e1; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; color: white; transition: all 0.15s;
  }
  .shop-check.checked { background: #22c55e; border-color: #22c55e; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tab {
    padding: 5px 14px; border-radius: 99px; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; border: 1.5px solid #e5e7ef; background: white; color: #8b92a5; transition: all 0.15s;
  }
  .tab.active { background: #6366f1; border-color: #6366f1; color: white; }
  .tab:hover:not(.active) { border-color: #6366f1; color: #6366f1; }

  /* ── Total Bar ── */
  .total-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white; padding: 14px 20px; border-radius: 12px; margin-top: 16px;
  }
  .total-bar-label { font-size: 0.82rem; opacity: 0.85; }
  .total-bar-value { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white; border-radius: 20px; padding: 28px 32px;
    width: 90%; max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 0.78rem; font-weight: 600; color: #8b92a5; margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%; border: 1.5px solid #e5e7ef; border-radius: 10px;
    padding: 9px 12px; font-size: 0.88rem; outline: none;
    font-family: inherit; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: #6366f1; }
  .btn-row { display: flex; gap: 10px; margin-top: 20px; }
  .btn {
    flex: 1; padding: 10px; border-radius: 10px; border: none;
    font-size: 0.88rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .btn-primary   { background: #6366f1; color: white; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-secondary { background: #f0f2f5; color: #8b92a5; }
  .btn-secondary:hover { background: #e5e7ef; }
  .btn-danger    { background: #fee2e2; color: #ef4444; }
  .btn-danger:hover { background: #fecaca; }
  .btn-add {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.8rem; font-weight: 600; color: #6366f1;
    background: #eef2ff; border: none; border-radius: 99px;
    padding: 5px 14px; cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .btn-add:hover { background: #e0e7ff; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .col-span-3 { grid-column: span 2; }
  }
  @media (max-width: 640px) {
    .grid-3, .grid-2 { grid-template-columns: 1fr; }
    .col-span-2, .col-span-3 { grid-column: span 1; }
    header { padding: 20px 18px; }
    .container { padding: 18px 14px; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">데이터 불러오는 중...</div>
</div>

<!-- Save Status -->
<div id="save-status"></div>

<!-- Header -->
<header>
  <div>
    <h1>🏠 아파트 입주 준비 대시보드</h1>
    <div class="subtitle">모든 준비사항을 한눈에 확인하세요</div>
  </div>
  <div class="dday-badge" id="dday-badge">-</div>
</header>

<div class="container">

  <!-- KPI -->
  <div class="grid-3">
    <div class="card">
      <div class="card-accent" style="background:#6366f1"></div>
      <div class="card-title">총 비용</div>
      <div class="card-value" id="kpi-total">-</div>
      <div class="card-sub">분양가 + 옵션 + 기타</div>
    </div>
    <div class="card">
      <div class="card-accent" style="background:#22c55e"></div>
      <div class="card-title">납부 완료</div>
      <div class="card-value" id="kpi-paid">-</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>납부율</span><span id="kpi-paid-pct">-</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="pb-paid" style="background:#22c55e;width:0%"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-accent" style="background:#f97316"></div>
      <div class="card-title">잔여 납부액</div>
      <div class="card-value" id="kpi-remain">-</div>
      <div class="card-sub">입주 전까지 납부 필요</div>
    </div>
    <div class="card">
      <div class="card-accent" style="background:#a855f7"></div>
      <div class="card-title">할 일 진행률</div>
      <div class="card-value" id="kpi-todo">-</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>완료된 항목</span><span id="kpi-todo-detail">-</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="pb-todo" style="background:#a855f7;width:0%"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-accent" style="background:#06b6d4"></div>
      <div class="card-title">쇼핑 진행률</div>
      <div class="card-value" id="kpi-shop">-</div>
      <div class="progress-wrap">
        <div class="progress-label"><span>구매 완료</span><span id="kpi-shop-detail">-</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="pb-shop" style="background:#06b6d4;width:0%"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-accent" style="background:#f43f5e"></div>
      <div class="card-title">가전/가구 예상 비용</div>
      <div class="card-value" id="kpi-shop-cost">-</div>
      <div class="card-sub" id="kpi-shop-remain-cost">-</div>
    </div>
  </div>

  <!-- 비용 + 납부 일정 -->
  <div class="grid-2 section-gap">
    <div class="card">
      <div class="section-header">
        <div class="section-title"><div class="section-icon" style="background:#eef2ff">💰</div>비용 상세 내역</div>
        <button class="btn-add" onclick="openCostModal(null)">+ 항목 추가</button>
      </div>
      <table class="cost-table">
        <thead><tr>
          <th>항목</th><th>메모</th><th style="text-align:right">금액</th><th style="text-align:center">상태</th>
        </tr></thead>
        <tbody id="cost-tbody"></tbody>
      </table>
      <div class="total-bar">
        <div class="total-bar-label">총 비용 합계</div>
        <div class="total-bar-value" id="total-bar-val">-</div>
      </div>
    </div>
    <div class="card">
      <div class="section-header">
        <div class="section-title"><div class="section-icon" style="background:#fff3e8">📅</div>납부 일정</div>
        <button class="btn-add" onclick="openPaymentModal(null)">+ 일정 추가</button>
      </div>
      <div class="timeline" id="payment-timeline"></div>
    </div>
  </div>

  <!-- 할 일 -->
  <div class="card section-gap">
    <div class="section-header">
      <div class="section-title"><div class="section-icon" style="background:#f3e8ff">✅</div>입주 준비 할 일</div>
      <button class="btn-add" onclick="openTodoModal(null)">+ 항목 추가</button>
    </div>
    <div class="tabs" id="todo-tabs"></div>
    <div id="todo-list"></div>
    <div style="margin-top:16px; background:#f7f8fc; border-radius:12px; padding:14px 16px;">
      <div class="progress-label" style="margin-bottom:8px">
        <span style="font-weight:600;color:#1a1a2e">전체 진행률</span>
        <span id="todo-overall-pct" style="font-weight:700;color:#a855f7">-</span>
      </div>
      <div class="progress-bar-bg" style="height:10px">
        <div class="progress-bar-fill" id="pb-todo-overall" style="background:linear-gradient(90deg,#6366f1,#a855f7);width:0%"></div>
      </div>
    </div>
  </div>

  <!-- 쇼핑 -->
  <div class="card section-gap">
    <div class="section-header">
      <div class="section-title"><div class="section-icon" style="background:#e0f2fe">🛒</div>가전 · 가구 쇼핑 리스트</div>
      <button class="btn-add" onclick="openShopModal(null)">+ 항목 추가</button>
    </div>
    <div class="tabs" id="shop-tabs"></div>
    <div class="shop-grid" id="shop-grid"></div>
    <div class="total-bar" style="background:linear-gradient(135deg,#0ea5e9,#06b6d4)">
      <div class="total-bar-label">쇼핑 총 예산</div>
      <div class="total-bar-value" id="shop-total-bar">-</div>
    </div>
  </div>

</div>

<!-- Modals -->
<div class="modal-overlay" id="cost-modal">
  <div class="modal">
    <div class="modal-title">💰 비용 항목</div>
    <input type="hidden" id="cost-idx">
    <div class="form-group"><label class="form-label">항목명</label><input class="form-input" id="cost-name" placeholder="예: 분양가"></div>
    <div class="form-group"><label class="form-label">금액 (만원)</label><input class="form-input" id="cost-amount" type="number" placeholder="예: 50000"></div>
    <div class="form-group"><label class="form-label">메모</label><input class="form-input" id="cost-memo" placeholder="예: 계약금 10%"></div>
    <div class="form-group"><label class="form-label">상태</label>
      <select class="form-input" id="cost-status">
        <option value="paid">납부완료</option>
        <option value="due">납부예정</option>
        <option value="pending">미확정</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('cost-modal')">취소</button>
      <button class="btn btn-danger" id="cost-delete-btn" onclick="deleteCost()" style="display:none">삭제</button>
      <button class="btn btn-primary" onclick="saveCost()">저장</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="payment-modal">
  <div class="modal">
    <div class="modal-title">📅 납부 일정</div>
    <input type="hidden" id="pay-idx">
    <div class="form-group"><label class="form-label">납부 일자</label><input class="form-input" id="pay-date" type="date"></div>
    <div class="form-group"><label class="form-label">내용</label><input class="form-input" id="pay-desc" placeholder="예: 중도금 1차"></div>
    <div class="form-group"><label class="form-label">금액 (만원)</label><input class="form-input" id="pay-amount" type="number" placeholder="예: 10000"></div>
    <div class="form-group"><label class="form-label">상태</label>
      <select class="form-input" id="pay-status">
        <option value="done">완료</option>
        <option value="upcoming">예정 (임박)</option>
        <option value="future">예정</option>
      </select>
    </div>
    <div class="btn-row">

// Firestore에서 불러오기
async function fetchData() {
  try {
    const doc = await DOC_REF.get();
    if (doc.exists) {
      data = doc.data();
    } else {
      // 첫 접속: 기본 데이터로 Firestore 초기화
      data = getDefaultData();
      await DOC_REF.set(data);
    }
  } catch(e) {
    console.error('Firestore 읽기 오류:', e);
    data = getDefaultData();
  }
}

// Firestore에 저장 (debounce 800ms)
function saveData() {
  clearTimeout(saveTimer);
  showSaveStatus('saving', '저장 중...');
  saveTimer = setTimeout(async () => {
    try {
      await DOC_REF.set(data);
      showSaveStatus('saved', '저장됨 ✓');
      setTimeout(() => hideSaveStatus(), 2000);
    } catch(e) {
      showSaveStatus('error', '저장 실패 ✕');
      setTimeout(() => hideSaveStatus(), 3000);
    }
  }, 800);
}

function hideSaveStatus() {

// ════════════════════════════════════════
//  D-DAY
// ════════════════════════════════════════
function updateDday() {
  const badge = document.getElementById('dday-badge');
  if (!data.moveDate) { badge.textContent = '입주일 미설정'; return; }
  const today = new Date(); today.setHours(0,0,0,0);
  const move  = new Date(data.moveDate); move.setHours(0,0,0,0);
  const diff  = Math.round((move - today) / 86400000);
  badge.textContent = diff > 0 ? `입주 D-${diff}` : diff === 0 ? '🎉 입주일!' : `입주 D+${Math.abs(diff)}`;
  badge.onclick = () => { document.getElementById('move-date-input').value = data.moveDate; openModal('date-modal'); };
}

async function saveMoveDate() {
  data.moveDate = document.getElementById('move-date-input').value;
  saveData(); closeModal('date-modal'); renderAll();
}

// ════════════════════════════════════════
//  FORMAT
// ════════════════════════════════════════
function fmt(n) {
  n = Number(n) || 0;
  if (n === 0) return '0만원';
  if (n >= 10000) return (n/10000).toFixed(1).replace(/\.0$/,'') + '억';
  return n.toLocaleString() + '만원';
}

// ════════════════════════════════════════
//  KPI
// ════════════════════════════════════════
function renderKPI() {
  const total  = data.costs.reduce((s,c)=>s+Number(c.amount||0),0);
  const paid   = data.costs.filter(c=>c.status==='paid').reduce((s,c)=>s+Number(c.amount||0),0);
  const paidPct= total > 0 ? Math.round(paid/total*100) : 0;

  document.getElementById('kpi-total').textContent   = fmt(total);
  document.getElementById('kpi-paid').textContent    = fmt(paid);
  document.getElementById('kpi-remain').textContent  = fmt(total-paid);
  document.getElementById('kpi-paid-pct').textContent= paidPct+'%';
  document.getElementById('pb-paid').style.width     = paidPct+'%';
  document.getElementById('total-bar-val').textContent = fmt(total);

  const doneTodos = data.todos.filter(t=>t.done).length;
  const todoPct   = data.todos.length > 0 ? Math.round(doneTodos/data.todos.length*100) : 0;
  document.getElementById('kpi-todo').textContent        = todoPct+'%';
  document.getElementById('kpi-todo-detail').textContent = `${doneTodos} / ${data.todos.length}`;
  document.getElementById('pb-todo').style.width         = todoPct+'%';
  document.getElementById('todo-overall-pct').textContent= todoPct+'%';
  document.getElementById('pb-todo-overall').style.width = todoPct+'%';

  const boughtShops = data.shops.filter(s=>s.bought).length;
  const shopPct     = data.shops.length > 0 ? Math.round(boughtShops/data.shops.length*100) : 0;
  const shopTotal   = data.shops.reduce((s,x)=>s+Number(x.price||0),0);
  const shopRemain  = data.shops.filter(s=>!s.bought).reduce((s,x)=>s+Number(x.price||0),0);
  document.getElementById('kpi-shop').textContent         = shopPct+'%';
  document.getElementById('kpi-shop-detail').textContent  = `${boughtShops} / ${data.shops.length}`;
  document.getElementById('pb-shop').style.width          = shopPct+'%';
  document.getElementById('kpi-shop-cost').textContent    = fmt(shopTotal);
  document.getElementById('kpi-shop-remain-cost').textContent = '미구매 잔여: ' + fmt(shopRemain);
  document.getElementById('shop-total-bar').textContent   = fmt(shopTotal);
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('show'); });
});

// Cost
function openCostModal(idx) {
  const isNew = idx===null;
  document.getElementById('cost-idx').value = isNew ? '' : idx;
  document.getElementById('cost-delete-btn').style.display = isNew ? 'none' : 'inline-flex';
  if (!isNew) {
    const c = data.costs[idx];
    document.getElementById('cost-name').value   = c.name;
    document.getElementById('cost-amount').value = c.amount;
    document.getElementById('cost-memo').value   = c.memo||'';
    document.getElementById('cost-status').value = c.status;
  } else {
    ['cost-name','cost-amount','cost-memo'].forEach(id => document.getElementById(id).value='');
    document.getElementById('cost-status').value='pending';
  }
  openModal('cost-modal');
}
function saveCost() {
  const idx = document.getElementById('cost-idx').value;
  const obj = { name:document.getElementById('cost-name').value, amount:Number(document.getElementById('cost-amount').value||0), memo:document.getElementById('cost-memo').value, status:document.getElementById('cost-status').value };
  if(idx==='') data.costs.push(obj); else data.costs[Number(idx)]=obj;
  saveData(); closeModal('cost-modal'); renderAll();
}
function deleteCost() {
  data.costs.splice(Number(document.getElementById('cost-idx').value),1);
  saveData(); closeModal('cost-modal'); renderAll();
}

  document.getElementById('todo-delete-btn').style.display = isNew ? 'none' : 'inline-flex';
  if (!isNew) {
    const t = data.todos[idx];
    document.getElementById('todo-name').value     = t.name;
    document.getElementById('todo-note').value     = t.note||'';
    document.getElementById('todo-category').value = t.category||'';
    document.getElementById('todo-priority').value = t.priority;
  } else {
    ['todo-name','todo-note','todo-category'].forEach(id => document.getElementById(id).value='');
    document.getElementById('todo-priority').value='mid';
  }
  openModal('todo-modal');
}
function saveTodo() {
  const idx = document.getElementById('todo-idx').value;
  const obj = { name:document.getElementById('todo-name').value, note:document.getElementById('todo-note').value, category:document.getElementById('todo-category').value, priority:document.getElementById('todo-priority').value, done:idx!=='' ? data.todos[Number(idx)].done : false };
  if(idx==='') data.todos.push(obj); else data.todos[Number(idx)]=obj;
  saveData(); closeModal('todo-modal'); renderAll();
}
function deleteTodo() {
  data.todos.splice(Number(document.getElementById('todo-idx').value),1);
  saveData(); closeModal('todo-modal'); renderAll();
}

// Shop
function openShopModal(idx) {
  const isNew = idx===null;
  document.getElementById('shop-idx').value = isNew ? '' : idx;
  document.getElementById('shop-delete-btn').style.display = isNew ? 'none' : 'inline-flex';
  if (!isNew) {
    const s = data.shops[idx];
    document.getElementById('shop-name').value  = s.name;
    document.getElementById('shop-cat').value   = s.category;
    document.getElementById('shop-price').value = s.price;
    document.getElementById('shop-memo').value  = s.memo||'';
  } else {
    ['shop-name','shop-cat','shop-price','shop-memo'].forEach(id => document.getElementById(id).value='');
  }
  openModal('shop-modal');
}
function saveShop() {
  const idx = document.getElementById('shop-idx').value;
  const obj = { name:document.getElementById('shop-name').value, category:document.getElementById('shop-cat').value, price:Number(document.getElementById('shop-price').value||0), memo:document.getElementById('shop-memo').value, bought:idx!=='' ? data.shops[Number(idx)].bought : false };
  if(idx==='') data.shops.push(obj); else data.shops[Number(idx)]=obj;
  saveData(); closeModal('shop-modal'); renderAll();
}
function deleteShop() {
  data.shops.splice(Number(document.getElementById('shop-idx').value),1);
  saveData(); closeModal('shop-modal'); renderAll();
}

(async () => {
  await fetchData();
  const overlay = document.getElementById('loading-overlay');
  overlay.classList.add('hidden');
  setTimeout(() => overlay.style.display='none', 400);
  renderAll();
})();
</script>
